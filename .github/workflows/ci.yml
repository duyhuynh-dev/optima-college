# Run on push/PR. Requires: protoc (Rust tonic-build), Go 1.24+.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  rust-kernel:
    name: Rust kernel
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust-kernel
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: dtolnay/rust-toolchain@stable

      - name: cargo test
        run: cargo test --verbose

      - name: cargo bench (compile only)
        run: cargo bench --no-run --verbose

  go-orchestrator:
    name: Go orchestrator
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go-orchestrator
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go-orchestrator/go.mod

      - name: go test
        run: go test ./... -count=1 -v

  python-ml:
    name: Python ML (ingest tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python-ml
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: pip install + pytest
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev]"
          python -m pytest tests/ -v

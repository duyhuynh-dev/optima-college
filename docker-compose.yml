# Local Jaeger all-in-one: OTLP/HTTP on :4318 (same endpoint for Go orchestrator + Rust kernel).
# UI: http://localhost:16686
#
#   docker compose up -d
#   export OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4318
#   # terminal 1: make run-kernel
#   # terminal 2: make run-orchestrator
#
services:
  jaeger:
    image: jaegertracing/all-in-one:1.57
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4318:4318"
